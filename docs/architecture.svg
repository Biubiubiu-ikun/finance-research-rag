<path d="M2 1L8 5L2 9" fill="none" stroke="#94A3B8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect x="0.5" y="0.5" width="679" height="623" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>

<text x="40" y="44" fill="#0F172A" font-size="20" font-weight="600">金融研报智能问答 RAG · 全链路架构</text>
<text x="40" y="65" fill="#64748B" font-size="12.5">全栈自研 · 未用 LangChain ｜ 8 行业 / 22 标的 / 300+ 篇研报</text>

<rect x="210" y="84" width="260" height="46" rx="10" fill="#1E293B"/>
