<svg width="100%" viewBox="0 0 680 624" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
<title>金融研报智能问答 RAG 全链路架构</title>
<desc>从研报 PDF 经数据层、检索层、生成层、Agent 层到服务层的五层流水线，右侧标注各层差异化亮点。</desc>
<defs>
